<div class="product-card">

    <div class="card-alert error" [class.hide]="!showError" [class.shake]="shakeAnimation">

        <div class="alert-icon">!</div>

        <div class="alert-text">
            {{ errorMessage }}
        </div>
    </div>

    <img
        *ngIf="hasProductImage"
        class="product-image"
        [src]="product.foto"
        [alt]="product.nome"
        (error)="onImageError()">

    <div *ngIf="!hasProductImage" class="product-image product-image-fallback" aria-hidden="true">
        <div class="product-fallback-badge">
            {{ product.marca || 'Prodotto' }}
        </div>

        <div class="product-fallback-icon">
            <span class="product-fallback-mark"></span>
        </div>

        <div class="product-fallback-meta">
            <span class="product-fallback-name">{{ product.nome }}</span>
            <span class="product-fallback-category">{{ product.categoria }}</span>
        </div>
    </div>

    <div class="product-card-body">

        <div class="product-header">
            <h5 class="product-title">
                <a [routerLink]="['/product', product.idProdotto]" class="product-link">
                    {{ product.nome }}
                </a>
            </h5>
        </div>

        <p class="product-description">
            {{ product.descrizione }}
        </p>

        <div class="product-info-row">
            <span class="product-info-pill" *ngIf="product.marca">
                {{ product.marca }}
            </span>

            <span class="product-info-pill" *ngIf="product.formato">
                {{ product.formato }}
            </span>

            <span class="product-info-pill">
                {{ product.qta }} disponibili
            </span>

            <span class="product-info-pill">
                {{ product.categoria }}
            </span>
        </div>

        <div class="product-footer">
            <div class="product-price-box">
                <span class="product-price-label">Prezzo</span>
                <span class="product-price">
                    {{ product.prezzo | currency:'EUR' }}
                </span>
            </div>

            <button class="btn-product bi bi-bag-plus" (click)="addToCart()">
                Aggiungi
            </button>
        </div>

    </div>
</div>
