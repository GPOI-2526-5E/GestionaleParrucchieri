<div class="register-container mt-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body">
            <h3 class="card-title text-center mb-4">Crea un Account</h3>
            
            <form>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Nome</label>
                  <input type="text" name="nome" [(ngModel)]="userData.nome" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Cognome</label>
                  <input type="text" name="cognome" [(ngModel)]="userData.cognome" class="form-control" required>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" [(ngModel)]="userData.email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" [(ngModel)]="userData.password" class="form-control" required>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Telefono</label>
                  <input type="tel" name="telefono" [(ngModel)]="userData.telefono" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Data di Nascita</label>
                  <input type="date" name="data_nascita" [(ngModel)]="userData.data_nascita" class="form-control">
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label">Ruolo</label>
                <select name="ruolo" [(ngModel)]="userData.ruolo" class="form-select">
                  <option value="cliente">Cliente</option>
                  <option value="operatore">Operatore</option>
                  <option value="admin">Amministratore</option>
                  <option value="salone">Salone</option>
                </select>
              </div>

              <button type="submit" class="btn btn-primary w-100 mb-3" (click)="register()">Registrati</button>
              
              <div class="text-center">
                <span>Hai già un account? </span>
                <a routerLink="/login" class="text-decoration-none">Accedi qui</a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
