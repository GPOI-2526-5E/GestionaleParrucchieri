<div class="register-container">
    <div class="register-image"></div>

    <div class="register-form-wrapper">
        <div class="register-card shadow-lg">
            <h3>Crea Account</h3>

            <form (submit)="register()">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" id="nome" name="nome" [(ngModel)]="userData.nome" class="form-control"
                            placeholder="Es: Mario" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cognome" class="form-label">Cognome</label>
                        <input type="text" id="cognome" name="cognome" [(ngModel)]="userData.cognome"
                            class="form-control" placeholder="Es: Rossi" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" [(ngModel)]="userData.email" class="form-control"
                        placeholder="mario.rossi@esempio.com" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" [(ngModel)]="userData.password"
                        class="form-control" placeholder="Scegli una password sicura" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="telefono" class="form-label">Telefono</label>
                        <input type="tel" id="telefono" name="telefono" [(ngModel)]="userData.telefono"
                            class="form-control" placeholder="333 1234567">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="data_nascita" class="form-label">Data di Nascita</label>
                        <input type="date" id="data_nascita" name="data_nascita" [(ngModel)]="userData.data_nascita"
                            class="form-control">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="ruolo" class="form-label">Tipo di Utente</label>
                    <select id="ruolo" name="ruolo" [(ngModel)]="userData.ruolo" class="form-select">
                        <option value="cliente">Cliente</option>

                        @if (auth.isAdmin()) {
                        <option value="operatore">Operatore</option>
                        <option value="admin">Amministratore</option>
                        }
                    </select>
                </div>

                <button type="submit" class="btn-register">REGISTRATI</button>

                <div class="footer-text mt-4">
                    Hai già un account?
                    <a routerLink="/login" class="login-link">Accedi subito</a>
                </div>
            </form>
        </div>
    </div>
</div>
