<app-navbar></app-navbar>

<div class="services-page">

    <div class="services-overlay"></div>

    <div class="gestionale-section container">

        <h2 class="services-title">Catalogo Servizi</h2>

        @if (servicesMD | async; as services) {

            @if(services.length == 0) {

                <div class="services-empty">
                    Nessun servizio disponibile al momento
                </div>

            }
            @else {

                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 services-grid">

                    @for(service of services; track service.id) {

                        <div class="col">
                            <app-service-card [service]="service"></app-service-card>
                        </div>

                    }

                </div>

            }

        }
        @else {

            <div class="services-loading">

                <div class="spinner-border text-light" role="status"></div>

                <p>Caricamento servizi...</p>

            </div>

        }

    </div>

</div>

<app-ai-chat-drawer></app-ai-chat-drawer>
