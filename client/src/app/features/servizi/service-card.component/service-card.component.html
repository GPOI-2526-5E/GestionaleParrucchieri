<div class="service-card">

    <div class="service-card-body">

        <div class="service-header">
            <h5 class="service-title">
                <a [routerLink]="['/service', service.id]" class="service-link">
                    {{ service.nome }}
                </a>
            </h5>

            <span class="duration-badge">
                {{ service.durata }} min
            </span>
        </div>

        <p class="service-description">
            {{ service.descrizione }}
        </p>

        <div class="service-footer">

            <span class="service-price">
                {{ service.prezzo | currency:'EUR' }}
            </span>

            <button class="btn-book" (click)="addToCart()">
                Prenota
            </button>

        </div>

    </div>

</div>
