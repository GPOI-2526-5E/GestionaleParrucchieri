<div class="card h-100 shadow-sm">
    <div class="card-body d-flex flex-column">
        <h5 class="card-title">
            <a [routerLink]="['/service', service.id]" class="text-decoration-none text-primary">
                {{ service.nome }}
            </a>
        </h5>
        <p class="card-text text-muted">di {{ service.descrizione }}</p>
        <p class="card-text text-truncate">Durata: {{ service.durata }} min</p>
        <div class="mt-auto d-flex justify-content-between align-items-center">
            <span class="fs-5 fw-bold text-success">{{ service.prezzo | currency: 'EUR'}}</span>
            <button class="btn btn-primary btn-sm" (click)="addToCart()">
                🛍️ Prenota
            </button>
        </div>
    </div>
</div>
