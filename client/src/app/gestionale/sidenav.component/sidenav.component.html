<aside class="management-sidenav" [class.is-collapsed]="isCollapsed">
  <div class="management-sidenav__topbar">
    <div class="management-sidenav__brand">
      <div class="management-sidenav__brand-mark">GP</div>
      <div class="management-sidenav__brand-copy">
        <p class="management-sidenav__eyebrow">Gestionale</p>
        <h2>I Parrucchieri</h2>
      </div>
    </div>
  </div>

  <div class="management-sidenav__status">
    <span class="management-sidenav__status-dot"></span>
    <div class="management-sidenav__status-copy">
      <strong>Salone operativo</strong>
      <p>Monitoraggio live di agenda e vendite</p>
    </div>
  </div>

  <nav class="management-sidenav__nav" aria-label="Navigazione gestionale">
    <section class="management-sidenav__section" *ngFor="let section of sections">
      <p class="management-sidenav__section-title">{{ section.title }}</p>

      <a
        *ngFor="let item of section.items"
        class="management-sidenav__link"
        [routerLink]="item.href"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.href === '/gestionale' }"
        [attr.title]="isCollapsed ? item.label : null"
      >
        <div class="management-sidenav__link-copy">
          <span class="management-sidenav__link-monogram">{{ item.label.slice(0, 2) }}</span>
          <div class="management-sidenav__link-head">
            <span>{{ item.label }}</span>
            <small *ngIf="item.badge">{{ item.badge }}</small>
          </div>
          <p>{{ item.description }}</p>
        </div>
      </a>
    </section>
  </nav>

  <div class="management-sidenav__footer">
    <p class="management-sidenav__footer-title">Area staff</p>
    <p class="management-sidenav__footer-copy">
      Gestione operativa del salone.
    </p>
  </div>
</aside>
